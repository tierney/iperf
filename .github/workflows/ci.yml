name: ci

on:
  push:
  pull_request:

jobs:
  legacy-linux-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool
      - name: Configure
        run: ./configure
      - name: Build
        run: make -j"$(nproc)"
      - name: Check (legacy matrix)
        run: make check
      - name: Distcheck
        run: make distcheck

  legacy-macos-build-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: ./configure
      - name: Build
        run: make -j4
      - name: Check (legacy matrix)
        run: make check
      - name: Distcheck
        run: make distcheck

  compare-with-iperf3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool iperf3
      - name: Build legacy iperf
        run: |
          ./configure
          make -j"$(nproc)"
      - name: Run legacy + iperf3 matrix
        run: |
          RUN_LEGACY=1 \
          RUN_IPERF3=1 \
          FAIL_ON_MISSING_BIN=1 \
          LEGACY_IPERF_BIN="$(pwd)/src/iperf" \
          ./tests/reverse-matrix.sh
